<!DOCTYPE html>
<html>
<head>
    <title>Weather SaaS Dashboard v2</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --primary: #3b82f6;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0b1220);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .header p {
            color: var(--muted);
            margin-top: 5px;
        }

        /* INPUT CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: white;
        }

        button {
            padding: 10px 14px;
            margin: 6px 5px 0 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* HERO WEATHER */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
        }

        .temp {
            font-size: 48px;
            font-weight: bold;
        }

        .condition {
            font-size: 16px;
            color: var(--muted);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }

        .label {
            font-size: 12px;
            color: var(--muted);
        }

        .value {
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* FORECAST */
        .forecast {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
        }

        .forecast-card {
            min-width: 120px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        /* LOADING */
        .loading {
            text-align: center;
            color: var(--muted);
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hero {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🌦 Weather SaaS Platform</h1>
        <p>Real-time weather intelligence dashboard</p>
    </div>

    <div class="card">

        <label>Latitude</label>
        <input id="lat" value="-1.2921">

        <label>Longitude</label>
        <input id="lon" value="36.8219">

        <div>
            <button onclick="loadCurrent()">Current</button>
            <button onclick="loadForecast()">Forecast</button>
        </div>

        <div id="status" class="loading"></div>

        <!-- HERO -->
        <div id="hero"></div>

        <!-- METRICS -->
        <div class="grid" id="metrics"></div>

        <!-- FORECAST -->
        <h3 style="margin-top:20px;">7-Day Forecast</h3>
        <div class="forecast" id="forecast"></div>

    </div>
</div>

<script>
const API = "/api/weather/";

async function fetchWeather(days) {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    document.getElementById("status").innerText = "Loading...";

    const res = await fetch(`${API}?lat=${lat}&lon=${lon}&days=${days}`);
    return await res.json();
}

/* CURRENT */
async function loadCurrent() {
    const data = await fetchWeather(1);

    document.getElementById("status").innerText = "";

    // HERO
    document.getElementById("hero").innerHTML = `
        <div class="hero">
            <div>
                <div class="temp">${data.temperature ?? "N/A"}°</div>
                <div class="condition">${data.condition ?? "Unknown"}</div>
            </div>
        </div>
    `;

    // METRICS
    document.getElementById("metrics").innerHTML = `
        ${box("Humidity", data.humidity + "%")}
        ${box("Wind Speed", data.wind_speed)}
        ${box("Temperature", data.temperature + "°")}
    `;

    document.getElementById("forecast").innerHTML = "";
}

/* FORECAST */
async function loadForecast() {
    const data = await fetchWeather(7);

    document.getElementById("status").innerText = "";

    const forecast = data.forecast || [];

    document.getElementById("forecast").innerHTML =
        forecast.map(d => `
            <div class="forecast-card">
                <div class="label">${d.date || "Day"}</div>
                <div class="value">${d.temperature ?? "N/A"}°</div>
                <div class="label">${d.condition ?? ""}</div>
            </div>
        `).join("");
}

/* COMPONENT */
function box(label, value) {
    return `
        <div class="box">
            <div class="label">${label}</div>
            <div class="value">${value ?? "N/A"}</div>
        </div>
    `;
}
</script>

</body>
</html>
