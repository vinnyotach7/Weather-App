<!DOCTYPE html>
<html>
<head>
    <title>Weather SaaS Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .header p {
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Glass card */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            padding: 12px 16px;
            margin: 6px 5px 0 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .section-title {
            margin-top: 25px;
            font-size: 16px;
            color: #cbd5e1;
        }

        /* Current weather grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        /* Forecast grid */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .weather-box {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            transition: 0.2s;
        }

        .weather-box:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.1);
        }

        .label {
            font-size: 12px;
            color: #94a3b8;
        }

        .value {
            font-size: 20px;
            font-weight: bold;
            margin-top: 6px;
        }

        .small {
            font-size: 12px;
            color: #cbd5e1;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }

        .weather-icon {
            font-size: 22px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🌦 Weather SaaS Dashboard</h1>
        <p>Real-time weather intelligence for your location</p>
    </div>

    <div class="card">

        <label>Latitude</label>
        <input id="lat" value="-1.2921">

        <label>Longitude</label>
        <input id="lon" value="36.8219">

        <div>
            <button onclick="getCurrent()">Current</button>
            <button onclick="getForecast()">Forecast</button>
        </div>

        <div id="output" class="loading"></div>

        <!-- CURRENT -->
        <div class="section-title">📍 Current Conditions</div>
        <div class="grid" id="weatherGrid"></div>

        <!-- FORECAST -->
        <div class="section-title">📊 7-Day Forecast</div>
        <div class="forecast-grid" id="forecastGrid"></div>

    </div>
</div>

<script>
async function fetchWeather(days) {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    document.getElementById("output").innerText = "Loading...";
    document.getElementById("weatherGrid").innerHTML = "";
    document.getElementById("forecastGrid").innerHTML = "";

    try {
        const res = await fetch(`/api/weather/?lat=${lat}&lon=${lon}&days=${days}`);
        const data = await res.json();

        console.log(data);

        if (data.error) {
            document.getElementById("output").innerText = data.error;
            return;
        }

        document.getElementById("output").innerText = "";

        // ---------------- CURRENT ----------------
        document.getElementById("weatherGrid").innerHTML = `
            <div class="weather-box">
                <div class="weather-icon">🌡</div>
                <div class="label">Temperature</div>
                <div class="value">${data.temperature ?? "N/A"}°</div>
            </div>

            <div class="weather-box">
                <div class="weather-icon">💧</div>
                <div class="label">Humidity</div>
                <div class="value">${data.humidity ?? "N/A"}%</div>
            </div>

            <div class="weather-box">
                <div class="weather-icon">🌬</div>
                <div class="label">Wind</div>
                <div class="value">${data.wind_speed ?? "N/A"}</div>
            </div>

            <div class="weather-box">
                <div class="weather-icon">☁️</div>
                <div class="label">Condition</div>
                <div class="value">${data.condition ?? "Unknown"}</div>
            </div>
        `;

        // ---------------- FORECAST ----------------
        const forecast = data.forecast || [];
        const forecastGrid = document.getElementById("forecastGrid");

        if (!forecast.length) {
            forecastGrid.innerHTML = `<div class="small">No forecast data available</div>`;
            return;
        }

        forecast.forEach(day => {
            forecastGrid.innerHTML += `
                <div class="weather-box">
                    <div class="weather-icon">📅</div>
                    <div class="label">${day.date || "Day"}</div>
                    <div class="value">${day.temperature ?? "N/A"}°</div>
                    <div class="small">${day.condition ?? "Unknown"}</div>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Failed to load weather data";
    }
}

function getCurrent() {
    fetchWeather(1);
}

function getForecast() {
    fetchWeather(7);
}
</script>

</body>
</html>
